services:
  - type: web
    name: portfolio-backend
    env: docker
    dockerContext: backend
    dockerCommand: "java -jar app.jar"
    plan: free
    envVars:
      - key: DB_HOST
        value: portfolio-db
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        fromService:
          type: env
          name: portfolio-db
          property: MYSQL_DATABASE
      - key: DB_USERNAME
        fromService:
          type: env
          name: portfolio-db
          property: MYSQL_USER
      - key: DB_PASSWORD
        fromService:
          type: env
          name: portfolio-db
          property: MYSQL_PASSWORD
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: portfolio-frontend
    env: docker
    dockerContext: frontend
    plan: free
    envVars:
      - key: BACKEND_URL
        value: http://portfolio-backend:8080

  - type: worker
    name: portfolio-db
    env: docker
    dockerContext: database
    plan: free
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      - key: MYSQL_DATABASE
        value: portfolio_db
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_USER
        value: eakhal
      - key: MYSQL_PASSWORD
        generateValue: true
