services:
  - type: web
    name: portfolio-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile.backend
    dockerCommand: "java -jar app.jar"
    plan: free
    envVars:
      - key: DB_HOST_PORT
        fromService:
          type: pserv
          name: portfolio-db
          property: hostport
      - key: DB_NAME
        fromService:
          type: pserv
          name: portfolio-db
          property: MYSQL_DATABASE
      - key: DB_USERNAME
        fromService:
          type: pserv
          name: portfolio-db
          property: MYSQL_USER
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: portfolio-db
          property: MYSQL_PASSWORD
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: portfolio-frontend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile.frontend
    plan: free
    envVars:
      - key: BACKEND_URL
        value: http://portfolio-backend:8080

  - type: pserv
    name: portfolio-db
    env: docker
    dockerContext: database
    plan: free
    envVars:
      - key: MYSQL_DATABASE
        value: portfolio_db
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_USER
        value: eakhal
      - key: MYSQL_PASSWORD
        generateValue: true
